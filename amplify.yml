version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install
    build:
      commands:
        - pnpm --filter ./client run build
  artifacts:
    baseDirectory: client/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - client/node_modules/**/*
      - server/node_modules/**/*
      - shared/node_modules/**/*
